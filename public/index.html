<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crash Navigator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <style>
        :root { --bg: #000000; --card: #111111; --border: #222222; --emerald: #00d1b2; --danger: #ff3860; --text: #e0e0e0; }
        body { background-color: var(--bg); color: var(--text); min-height: 100vh; font-family: system-ui, -apple-system, sans-serif; }
        
        .card { background-color: var(--card); border: 1px solid var(--border); color: #fff; border-radius: 1rem; box-shadow: 0 4px 20px rgba(0,0,0,0.5); transition: 0.3s; }
        .card:hover { border-color: #444; }
        .input { background-color: #080808; border-color: var(--border); color: #fff; border-radius: 0.5rem; }
        .input:focus { border-color: var(--emerald); box-shadow: 0 0 0 1px var(--emerald); }
        
        /* Tabs */
        .tab-content { display: none; }
        .tab-content.is-active { display: block; }
        .nav-btn { background: #1a1a1a; border: none; color: #666; font-weight: bold; padding: 12px 20px; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .nav-btn.active { background: var(--emerald); color: #000; }

        /* Strategy Table */
        .table { background-color: transparent; color: var(--text); width: 100%; }
        .table thead th { color: #555; border-bottom: 2px solid var(--border); text-transform: uppercase; font-size: 0.7rem; }
        .table td { border-bottom: 1px solid var(--border); padding: 0.75rem 0.5rem; vertical-align: middle; }
        .table tr:last-child td { border-bottom: none; }

        /* Stock Scale UI */
        .scale-wrapper { display: flex; height: 220px; gap: 15px; align-items: stretch; margin-top: 10px; }
        .scale-axis { display: flex; flex-direction: column; justify-content: space-between; align-items: flex-end; width: 20px; color: #444; font-weight: bold; font-size: 0.75rem; }
        .progress-v-track { width: 14px; background: #080808; border: 1px solid var(--border); border-radius: 10px; position: relative; overflow: hidden; }
        .progress-v-fill { position: absolute; bottom: 0; width: 100%; background: linear-gradient(to top, var(--danger), var(--emerald)); transition: height 0.8s ease; }
        .current-marker { position: absolute; left: -5px; right: -5px; height: 2px; background: #fff; box-shadow: 0 0 10px #fff; z-index: 5; transition: bottom 0.8s; }
        .level-inputs { flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .level-group { display: flex; align-items: center; gap: 8px; }
        .level-tag { font-size: 0.6rem; color: #555; width: 35px; text-transform: uppercase; font-weight: bold; }
        .level-input { height: 30px !important; font-size: 0.8rem !important; background: #000 !important; }

        .has-text-emerald { color: var(--emerald) !important; }
    </style>
</head>
<body>
<div class="container p-4">
    <!-- Header -->
    <div class="is-flex is-justify-content-between is-align-items-center mb-5">
        <div>
            <h1 class="title is-4 has-text-white mb-0">Crash Navigator</h1>
            <p class="is-size-7 has-text-grey">v6.3 TwelveData Batch Mode</p>
        </div>
        <div class="buttons has-background-black p-1" style="border-radius: 10px; border: 1px solid #222;">
            <button id="btn-strat" class="nav-btn active" onclick="tab('strat')">Strategy</button>
            <button id="btn-shop" class="nav-btn" onclick="tab('shop')">Shopping</button>
        </div>
    </div>

    <!-- Strategy Tab -->
    <div id="tab-strat" class="tab-content is-active">
        <div class="card p-5 mb-4">
            <div class="columns is-mobile">
                <div class="column">
                    <label class="label has-text-grey is-size-7">Total Cash</label>
                    <input class="input is-medium" type="number" id="cash" oninput="updateStrategy()">
                </div>
                <div class="column">
                    <label class="label has-text-grey is-size-7">Current Drop %</label>
                    <input class="input is-medium" type="number" id="drop" oninput="updateStrategy()">
                </div>
            </div>
        </div>
        <div class="card">
            <div style="overflow-x: auto;">
                <table class="table is-narrow">
                    <thead>
                        <tr>
                            <th>Drop</th>
                            <th>Target %</th>
                            <th class="has-text-right">Deploy Now</th>
                            <th class="has-text-right">Cumulative</th>
                        </tr>
                    </thead>
                    <tbody id="out" class="is-size-7"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Shopping Tab -->
    <div id="tab-shop" class="tab-content">
        <div class="field has-addons mb-5">
            <div class="control is-expanded">
                <input id="tick" class="input" placeholder="Ticker (e.g. TSLA)...">
            </div>
            <div class="control">
                <button class="button is-primary" onclick="add()">Add +</button>
            </div>
            <div class="control ml-2">
                <button id="ref-btn" class="button is-dark" onclick="refresh()">Refresh All Prices</button>
            </div>
        </div>
        <div id="list" class="columns is-multiline is-mobile"></div>
    </div>
</div>

<script>
    // Default Configuration
    const DEFAULT_LIST = [
        "AAPL", "AMAT", "ASML", "AVGO", "AMZN", 
        "FTNT", "GOOG", "LLY", "MSFT", "META", 
        "NFLX", "PYPL", "V", "CDNS", "URA"
    ].map(t => ({ t, lv: [0, 0, 0, 0], p: null }));

    let state = {
        cash: 10000,
        drop: 0,
        list: DEFAULT_LIST
    };

    function loadState() {
        const saved = localStorage.getItem('crash_navigator_v6');
        if (saved) {
            const parsed = JSON.parse(saved);
            state.cash = parsed.cash || 10000;
            state.drop = parsed.drop || 0;
            // Ensure the list is preserved or defaults are used
            state.list = parsed.list && parsed.list.length > 0 ? parsed.list : DEFAULT_LIST;
        }
        document.getElementById('cash').value = state.cash;
        document.getElementById('drop').value = state.drop;
        draw();
        render();
        refresh(); // Auto-refresh prices on load
    }

    function save() { localStorage.setItem('crash_navigator_v6', JSON.stringify(state)); }

    function updateStrategy() {
        state.cash = parseFloat(document.getElementById('cash').value) || 0;
        state.drop = parseFloat(document.getElementById('drop').value) || 0;
        save();
        draw();
    }

    function updateLevel(sIdx, lIdx, val) {
        state.list[sIdx].lv[lIdx] = parseFloat(val) || 0;
        save();
    }

    function tab(t) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('is-active'));
        document.getElementById('tab-'+t).classList.add('is-active');
        document.getElementById('btn-strat').classList.toggle('active', t==='strat');
        document.getElementById('btn-shop').classList.toggle('active', t==='shop');
        if(t === 'shop') render();
    }

    function calc(d) { return d < 27 ? d + 10 : (2.75 * d) - 25.64; }

    function draw() {
        const b = document.getElementById('out'); b.innerHTML = '';
        let prevTarget = 0; let target = 0; let i = 0;
        while (target < 100 && i < 40) { 
            const curDrop = state.drop + (i * 2);
            target = Math.min(100, calc(curDrop));
            const incrementPct = target - prevTarget;
            const deployNow = (incrementPct / 100) * state.cash;
            const cumulative = (target / 100) * state.cash;
            if (deployNow >= 0) {
                b.innerHTML += `<tr>
                    <td><strong class="has-text-white">-${curDrop}%</strong></td>
                    <td>${target.toFixed(1)}%</td>
                    <td class="has-text-right has-text-emerald">$${deployNow.toLocaleString(undefined, {maximumFractionDigits:0})}</td>
                    <td class="has-text-right has-text-grey">$${cumulative.toLocaleString(undefined, {maximumFractionDigits:0})}</td>
                </tr>`;
            }
            prevTarget = target; i++;
        }
    }

    function render() {
        const g = document.getElementById('list'); 
        g.innerHTML = '';
        state.list.forEach((item, i) => {
            const L4 = parseFloat(item.lv[3]) || 0;
            const L1 = parseFloat(item.lv[0]) || 0;
            const topLevel = L1 + ((L1 - L4) * 0.2); 
            const range = topLevel - L4;
            let prog = (range > 0 && item.p) ? Math.max(0, Math.min(100, ((parseFloat(item.p) - L4) / range) * 100)) : 0;

            g.innerHTML += `
                <div class="column is-12-mobile is-4-tablet is-3-desktop">
                    <div class="card p-4">
                        <div class="is-flex is-justify-content-between mb-1">
                            <strong class="is-size-5 has-text-white">${item.t}</strong>
                            <span class="has-text-emerald is-size-5 weight-bold">${item.p ? '$'+item.p : '---'}</span>
                        </div>
                        <div class="mb-4"><button class="button is-ghost is-small p-0 has-text-danger" onclick="remove(${i})">Remove</button></div>

                        <div class="scale-wrapper">
                            <div class="scale-axis"><span>5</span><span>4</span><span>3</span><span>2</span><span>1</span><span>0</span></div>
                            <div class="progress-v-track">
                                <div class="progress-v-fill" style="height: ${prog}%"></div>
                                ${item.p ? `<div class="current-marker" style="bottom: ${prog}%"></div>` : ''}
                            </div>
                            <div class="level-inputs">
                                ${['Entry', 'DCA 1', 'DCA 2', 'Floor'].map((label, li) => `
                                    <div class="level-group">
                                        <span class="level-tag">${label}</span>
                                        <input class="input level-input" type="number" value="${item.lv[li]}" 
                                        oninput="updateLevel(${i}, ${li}, this.value)" onchange="render()">
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>`;
        });
    }

    async function add() { 
        const t = document.getElementById('tick').value.toUpperCase().trim(); 
        if(t) { 
            state.list.unshift({t, lv:[0,0,0,0], p:null}); 
            document.getElementById('tick').value = ''; 
            save(); 
            render();
            await refresh(); 
        } 
    }

    function remove(i) { 
        if(confirm(`Remove ${state.list[i].t}?`)) {
            state.list.splice(i, 1); 
            save(); 
            render(); 
        }
    }
    
    async function refresh() {
        if (state.list.length === 0) return;
        const btn = document.getElementById('ref-btn'); 
        btn.classList.add('is-loading');

        try {
            // ONE BATCH REQUEST for all symbols
            const tickers = state.list.map(i => i.t).join(',');
            const res = await fetch(`/api/prices?symbols=${tickers}`);
            const dataArray = await res.json();
            
            if (dataArray.error) {
                console.error("API Error:", dataArray.error);
                btn.innerText = "Rate Limited - Wait";
                setTimeout(() => { btn.innerText = "Refresh All Prices"; }, 3000);
                return;
            }

            // Sync API results with local state
            state.list.forEach(item => {
                const found = dataArray.find(d => d.symbol === item.t);
                if (found && found.price) {
                    item.p = parseFloat(found.price).toFixed(2);
                }
            });

            save(); 
            render();
        } catch(e) { 
            console.error("Network Error:", e); 
        } finally { 
            btn.classList.remove('is-loading'); 
        }
    }

    window.onload = loadState;
</script>
</body>
</html>
