<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Crash Navigator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <style>
        :root { --bg: #0a0a0a; --card: #141414; --border: #262626; --emerald: #00d1b2; --blue: #3e8ed0; }
        body { background-color: var(--bg); color: #fff; min-height: 100vh; font-family: system-ui, -apple-system, sans-serif; }
        .card { background-color: var(--card); border: 1px solid var(--border); color: #fff; border-radius: 1.25rem; }
        .input { background-color: #000; border-color: var(--border); color: #fff; border-radius: 0.5rem; }
        .input:focus { border-color: var(--emerald); box-shadow: none; }
        .table { background-color: transparent; color: #fff; width: 100%; }
        .table thead th { color: #666; border-bottom: 1px solid var(--border); text-transform: uppercase; font-size: 0.75rem; }
        .table td { border-bottom: 1px solid var(--border); padding: 0.75rem; }
        .tab-content { display: none; }
        .tab-content.is-active { display: block; }
        .nav-btn { background: transparent; border: none; color: #888; font-weight: bold; padding: 10px 20px; cursor: pointer; border-radius: 10px; }
        .nav-btn.active { background: var(--emerald); color: #000; }

        /* Thermometer UI */
        .thermometer-container { display: flex; align-items: stretch; height: 180px; padding: 10px 0; gap: 15px; }
        .thermo-track { width: 14px; background: #000; border: 1px solid var(--border); border-radius: 20px; position: relative; overflow: hidden; }
        .thermo-fill { position: absolute; bottom: 0; width: 100%; background: linear-gradient(to top, var(--emerald), var(--blue)); transition: height 0.6s ease; border-radius: 20px; }
        .thermo-labels { display: flex; flex-direction: column; justify-content: space-between; flex-grow: 1; }
        .level-row { display: flex; align-items: center; gap: 8px; height: 24px; }
        .level-row span { font-size: 0.7rem; color: #666; width: 22px; }
        .level-input { height: 24px !important; font-size: 0.75rem !important; padding: 2px 5px !important; }
        .current-price-marker { position: absolute; left: -5px; right: -5px; height: 2px; background: white; box-shadow: 0 0 8px #fff; z-index: 2; transition: bottom 0.6s; }
    </style>
</head>
<body>
<div class="container p-4">
    <div class="is-flex is-justify-content-between is-align-items-center mb-5">
        <div>
            <h1 class="title is-4 has-text-white mb-1">Crash Navigator</h1>
            <p class="subtitle is-7 has-text-grey">Secure Thermometer v4</p>
        </div>
        <div class="buttons has-background-black-ter p-1" style="border-radius: 12px;">
            <button id="btn-strat" class="nav-btn active" onclick="tab('strat')">Strategy</button>
            <button id="btn-shop" class="nav-btn" onclick="tab('shop')">Shopping</button>
        </div>
    </div>

    <div id="tab-strat" class="tab-content is-active">
        <div class="columns">
            <div class="column is-4">
                <div class="card p-5 mb-4">
                    <label class="label has-text-grey is-small">Cash to Deploy</label>
                    <input class="input is-medium" type="number" id="cash" value="10000" oninput="updateStrategy()">
                    <label class="label has-text-grey is-small mt-4">Current Drop %</label>
                    <input class="input is-medium" type="number" id="drop" value="0" oninput="updateStrategy()">
                </div>
            </div>
            <div class="column is-8">
                <div class="card" style="overflow-x: auto;"><table class="table"><thead><tr><th>Drop %</th><th>Target %</th><th class="has-text-right">Deploy</th></tr></thead><tbody id="out"></tbody></table></div>
            </div>
        </div>
    </div>

    <div id="tab-shop" class="tab-content">
        <div class="field has-addons mb-5">
            <div class="control is-expanded"><input id="tick" class="input" placeholder="Ticker..."></div>
            <div class="control"><button class="button is-primary" onclick="add()">Add</button></div>
            <div class="control ml-2"><button id="ref-btn" class="button is-dark" onclick="refresh()">Refresh</button></div>
        </div>
        <div id="list" class="columns is-multiline is-mobile"></div>
    </div>
</div>

<script>
    let state = {
        cash: 10000,
        drop: 0,
        list: [{ t: 'NVDA', lv: [140, 120, 100, 90], p: null }]
    };

    function loadState() {
        const saved = localStorage.getItem('crash_navigator_v4');
        if (saved) {
            state = JSON.parse(saved);
            document.getElementById('cash').value = state.cash;
            document.getElementById('drop').value = state.drop;
        }
        draw();
        render();
    }

    function save() {
        localStorage.setItem('crash_navigator_v4', JSON.stringify(state));
    }

    // This updates the Strategy values immediately
    function updateStrategy() {
        state.cash = parseFloat(document.getElementById('cash').value) || 0;
        state.drop = parseFloat(document.getElementById('drop').value) || 0;
        save();
        draw();
    }

    // This updates stock level data in the background WITHOUT redrawing the HTML
    // This prevents the keyboard from closing
    function updateLevel(stockIdx, levelIdx, val) {
        state.list[stockIdx].lv[levelIdx] = val;
        save();
    }

    function tab(t) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('is-active'));
        document.getElementById('tab-'+t).classList.add('is-active');
        document.getElementById('btn-strat').classList.toggle('active', t==='strat');
        document.getElementById('btn-shop').classList.toggle('active', t==='shop');
        if(t === 'shop') render();
    }

    function calc(d) { return d < 27 ? d + 10 : (2.75 * d) - 25.64; }

    function draw() {
        const b = document.getElementById('out'); b.innerHTML = '';
        let prev = 0;
        for(let i=0; i<15; i++) {
            const curD = state.drop + (i*2);
            const target = Math.min(100, calc(curD));
            const inc = i===0 ? target : Math.max(0, target-prev);
            b.innerHTML += `<tr><td><strong>-${curD}%</strong></td><td>${target.toFixed(1)}%</td><td class="has-text-right has-text-primary">$${((inc/100)*state.cash).toLocaleString(undefined, {maximumFractionDigits:0})}</td></tr>`;
            prev = target;
        }
    }

    function render() {
        const g = document.getElementById('list'); 
        g.innerHTML = '';
        state.list.forEach((item, i) => {
            const range = item.lv[0] - item.lv[3];
            const prog = (range > 0 && item.p) ? Math.max(0, Math.min(100, ((item.lv[0] - item.p) / range) * 100)) : 0;

            g.innerHTML += `
                <div class="column is-12-mobile is-4-desktop">
                    <div class="card p-4">
                        <div class="is-flex is-justify-content-between align-items-center mb-3">
                            <strong class="is-size-5">${item.t}</strong>
                            <div class="has-text-right">
                                <p class="is-size-4 has-text-primary weight-bold mb-0">${item.p ? '$'+item.p : '--'}</p>
                                <button class="button is-ghost is-small p-0 has-text-danger" onclick="remove(${i})">Remove</button>
                            </div>
                        </div>

                        <div class="thermometer-container">
                            <div class="thermo-track">
                                <div class="thermo-fill" style="height: ${prog}%"></div>
                                ${item.p ? `<div class="current-price-marker" style="bottom: ${prog}%"></div>` : ''}
                            </div>
                            <div class="thermo-labels">
                                ${item.lv.map((v, li) => `
                                    <div class="level-row">
                                        <span>L${li+1}</span>
                                        <input class="input is-small level-input" type="number" value="${v}" 
                                        oninput="updateLevel(${i}, ${li}, this.value)"
                                        onchange="render()">
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                </div>`;
        });
    }

    function add() { 
        const t = document.getElementById('tick').value.toUpperCase(); 
        if(t) { 
            state.list.unshift({t, lv:[0,0,0,0], p:null}); 
            document.getElementById('tick').value = '';
            save(); render(); 
        } 
    }

    function remove(i) { state.list.splice(i, 1); save(); render(); }
    
    async function refresh() {
        const btn = document.getElementById('ref-btn'); 
        btn.classList.add('is-loading');
        try {
            const tickers = state.list.map(i => i.t).join(',');
            const res = await fetch(`/api/prices?symbols=${tickers}`);
            const data = await res.json();
            state.list.forEach(item => {
                const val = (state.list.length === 1) ? data : data[item.t];
                if(val && val.price) item.p = parseFloat(val.price).toFixed(2);
            });
            save(); render();
        } catch(e) { console.error(e); } finally { btn.classList.remove('is-loading'); }
    }

    window.onload = loadState;
</script>
</body>
</html>
